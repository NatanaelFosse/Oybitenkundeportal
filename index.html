<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Øybiten Kundeportal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 950px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        p {
            line-height: 1.5;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: none;
            background: #e5e7eb;
            color: #111827;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #2563eb;
            color: white;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .secondary-btn {
            background: #6b7280;
        }

        .secondary-btn:hover {
            background: #4b5563;
        }

        .danger-btn {
            background: #dc2626;
        }

        .danger-btn:hover {
            background: #b91c1c;
        }

        .case-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .case-buttons button {
            width: 100%;
            text-align: left;
        }

        .ticket {
            border: 1px solid #e5e7eb;
            border-left: 5px solid #2563eb;
            padding: 16px;
            border-radius: 12px;
            background: #f9fafb;
            margin-top: 15px;
        }

        .ticket h3 {
            margin: 0 0 10px;
            word-break: break-word;
        }

        .ticket p {
            margin: 6px 0;
            word-break: break-word;
        }

        .ticket-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-local {
            background: #fef3c7;
            color: #92400e;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .info {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .muted {
            color: #6b7280;
            font-size: 14px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .small {
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px auto;
                padding: 12px;
            }

            .card {
                padding: 18px;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="authSide" class="card">
            <h1>Øybiten Kundeportal</h1>
            <p>Registrer deg eller logg inn for å sende inn og følge opp saker.</p>

            <div class="tabs">
                <button class="tab-btn active" id="loginTab" onclick="visTab('login')">Logg inn</button>
                <button class="tab-btn" id="registrerTab" onclick="visTab('registrer')">Registrer</button>
            </div>

            <div id="loginError" class="message error"></div>
            <div id="regError" class="message error"></div>
            <div id="regSuccess" class="message success"></div>

            <form id="loginForm">
                <div>
                    <label for="loginEpost">E-post</label>
                    <input type="email" id="loginEpost" required>
                </div>

                <div>
                    <label for="loginPassord">Passord</label>
                    <input type="password" id="loginPassord" required>
                </div>

                <button type="submit">Logg inn</button>
            </form>

            <form id="registrerForm" style="display:none;">
                <div>
                    <label for="regNavn">Navn</label>
                    <input type="text" id="regNavn" required>
                </div>

                <div>
                    <label for="regEpost">E-post</label>
                    <input type="email" id="regEpost" required>
                </div>

                <div>
                    <label for="regPassord">Passord</label>
                    <input type="password" id="regPassord" required>
                </div>

                <div>
                    <label for="regPassordBekreft">Bekreft passord</label>
                    <input type="password" id="regPassordBekreft" required>
                </div>

                <button type="submit">Registrer bruker</button>
            </form>
        </div>

        <div id="caseSide" style="display:none;">
            <div class="card">
                <div class="top-bar">
                    <div>
                        <h1 id="velkomstTittel">Velkommen!</h1>
                        <p class="muted">Opprett en ny sak eller se dine eksisterende saker.</p>
                    </div>
                    <button class="secondary-btn" onclick="loggUt()">Logg ut</button>
                </div>
            </div>

            <div class="card">
                <h2>Velg en sak</h2>
                <p>Trykk på en av knappene under for å registrere en sak raskt.</p>

                <div class="case-buttons">
                    <button onclick="velgCase('Problemer med innlogging')">Problemer med innlogging</button>
                    <button onclick="velgCase('Glemt passord')">Glemt passord</button>
                    <button onclick="velgCase('Nettverket fungerer ikke')">Nettverket fungerer ikke</button>
                    <button onclick="velgCase('Internett er tregt')">Internett er tregt</button>
                    <button onclick="velgCase('Bestille ny PC')">Bestille ny PC</button>
                    <button onclick="velgCase('Tilgang til delt mappe')">Tilgang til delt mappe</button>
                    <button onclick="velgCase('Installere programvare')">Installere programvare</button>
                    <button onclick="velgCase('Feil på skriver')">Feil på skriver</button>
                    <button onclick="velgCase('Problemer med e-post')">Problemer med e-post</button>
                    <button onclick="velgCase('Problemer med Teams-møte')">Problemer med Teams-møte</button>
                    <button onclick="velgCase('Nettsiden fungerer ikke')">Nettsiden fungerer ikke</button>
                    <button onclick="velgCase('Ønske om ny funksjon på nettsiden')">Ønske om ny funksjon på nettsiden</button>
                    <button onclick="velgCase('Rapportere sikkerhetshendelse')">Rapportere sikkerhetshendelse</button>
                </div>
            </div>

            <div class="card">
                <h2>Fant du ikke saken din?</h2>

                <div id="ticketMessage" class="message info"></div>

                <div>
                    <label for="egenTittel">Tittel på saken</label>
                    <input type="text" id="egenTittel" placeholder="F.eks. VPN fungerer ikke">
                </div>

                <br>

                <div>
                    <label for="egenCase">Beskrivelse</label>
                    <textarea id="egenCase" placeholder="Beskriv problemet ditt her..."></textarea>
                </div>

                <br>

                <button onclick="sendEgenCase()">Send inn egen sak</button>
            </div>

            <div class="card">
                <div id="ticketListe"></div>
            </div>
        </div>
    </div>

    <script>
        let brukere = JSON.parse(localStorage.getItem("brukere")) || [];
        let innloggetBruker = JSON.parse(localStorage.getItem("innloggetBruker")) || null;
        let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
        let ticketTeller = parseInt(localStorage.getItem("ticketTeller")) || 1000;

        function lagreData() {
            localStorage.setItem("brukere", JSON.stringify(brukere));
            localStorage.setItem("innloggetBruker", JSON.stringify(innloggetBruker));
            localStorage.setItem("tickets", JSON.stringify(tickets));
            localStorage.setItem("ticketTeller", ticketTeller);
        }

        function visMelding(elementId, tekst, type = "info") {
            const el = document.getElementById(elementId);
            el.className = "message " + type;
            el.textContent = tekst;
            el.style.display = "block";
        }

        function skjulMelding(elementId) {
            const el = document.getElementById(elementId);
            el.style.display = "none";
            el.textContent = "";
        }

        function visTab(tab) {
            const loginForm = document.getElementById("loginForm");
            const registrerForm = document.getElementById("registrerForm");
            const loginTab = document.getElementById("loginTab");
            const registrerTab = document.getElementById("registrerTab");

            skjulMelding("loginError");
            skjulMelding("regError");
            skjulMelding("regSuccess");

            if (tab === "login") {
                loginForm.style.display = "flex";
                registrerForm.style.display = "none";
                loginTab.classList.add("active");
                registrerTab.classList.remove("active");
            } else {
                loginForm.style.display = "none";
                registrerForm.style.display = "flex";
                registrerTab.classList.add("active");
                loginTab.classList.remove("active");
            }
        }

        document.getElementById("registrerForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const navn = document.getElementById("regNavn").value.trim();
            const epost = document.getElementById("regEpost").value.trim().toLowerCase();
            const passord = document.getElementById("regPassord").value;
            const passordBekreft = document.getElementById("regPassordBekreft").value;

            skjulMelding("regError");
            skjulMelding("regSuccess");

            if (!navn || !epost || !passord || !passordBekreft) {
                visMelding("regError", "Fyll ut alle feltene.", "error");
                return;
            }

            if (passord !== passordBekreft) {
                visMelding("regError", "Passordene samsvarer ikke.", "error");
                return;
            }

            if (passord.length < 6) {
                visMelding("regError", "Passordet må være minst 6 tegn.", "error");
                return;
            }

            const eksisterer = brukere.find(b => b.epost === epost);
            if (eksisterer) {
                visMelding("regError", "Denne e-postadressen er allerede registrert.", "error");
                return;
            }

            brukere.push({
                navn: navn,
                epost: epost,
                passord: passord
            });

            lagreData();
            document.getElementById("registrerForm").reset();
            visMelding("regSuccess", "Registrering vellykket! Du kan nå logge inn.", "success");

            setTimeout(() => {
                visTab("login");
                document.getElementById("loginEpost").value = epost;
            }, 1200);
        });

        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const epost = document.getElementById("loginEpost").value.trim().toLowerCase();
            const passord = document.getElementById("loginPassord").value;

            skjulMelding("loginError");

            const bruker = brukere.find(b => b.epost === epost && b.passord === passord);

            if (!bruker) {
                visMelding("loginError", "Feil e-post eller passord.", "error");
                return;
            }

            innloggetBruker = bruker;
            lagreData();
            visPortal();
            document.getElementById("loginForm").reset();
        });

        function visPortal() {
            document.getElementById("authSide").style.display = "none";
            document.getElementById("caseSide").style.display = "block";
            document.getElementById("velkomstTittel").innerHTML = "Velkommen til kundeportalen, " + escapeHtml(innloggetBruker.navn) + "!";
            oppdaterTicketListe();
        }

        function velgCase(caseNavn) {
            leggTilTicket(caseNavn, "");
        }

        function sendEgenCase() {
            const tittel = document.getElementById("egenTittel").value.trim();
            const beskrivelse = document.getElementById("egenCase").value.trim();

            if (tittel === "" || beskrivelse === "") {
                visMelding("ticketMessage", "Fyll ut både tittel og beskrivelse.", "error");
                return;
            }

            leggTilTicket(tittel, beskrivelse);
            document.getElementById("egenTittel").value = "";
            document.getElementById("egenCase").value = "";
        }

       async function sendTilGitHub(ticket) {
    try {
        const response = await fetch("/.netlify/functions/create-issue", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                navn: innloggetBruker.navn,
                epost: innloggetBruker.epost,
                tittel: ticket.tittel,
                beskrivelse: ticket.beskrivelse,
                dato: ticket.dato,
                lokaltSaksnummer: ticket.id
            })
        });

        const result = await response.json();

        if (!response.ok) {
            console.error("Feil ved opprettelse av GitHub issue:", result);

            return {
                success: false,
                error: result.error || "Ukjent feil",
                details: result.details || null
            };
        }

        return result;
    } catch (error) {
        console.error("Kunne ikke sende til GitHub:", error);

        return {
            success: false,
            error: "Nettverksfeil",
            details: {
                message: error.message
            }
        };
    }
}


         
        

        async function leggTilTicket(tittel, beskrivelse) {
            skjulMelding("ticketMessage");

            ticketTeller++;

            const ticket = {
                id: ticketTeller,
                brukerEpost: innloggetBruker.epost,
                tittel: tittel,
                beskrivelse: beskrivelse,
                status: "Sender til GitHub",
                dato: new Date().toLocaleString("no-NO"),
                githubIssueUrl: null,
                githubIssueNumber: null
            };

            tickets.push(ticket);
            lagreData();
            oppdaterTicketListe();
            visMelding("ticketMessage", "Saken ble lagret og sendes til GitHub...", "info");

            const githubResult = await sendTilGitHub(ticket);

            if (githubResult && githubResult.success) {
                ticket.githubIssueUrl = githubResult.issueUrl;
                ticket.githubIssueNumber = githubResult.issueNumber;
                ticket.status = "Sendt til GitHub";
                visMelding("ticketMessage", "Saken ble sendt til GitHub og opprettet som issue.", "success");
            } else {
                ticket.status = "Lagret lokalt - feil ved sending til GitHub";
                visMelding("ticketMessage", "Saken ble lagret lokalt, men kunne ikke opprettes på GitHub.", "error");
            }

            lagreData();
            oppdaterTicketListe();
        }

        function slettTicket(id) {
            tickets = tickets.filter(t => t.id !== id);
            lagreData();
            oppdaterTicketListe();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function hentStatusKlasse(status) {
            if (status === "Sendt til GitHub") {
                return "status status-success";
            }

            if (status === "Lagret lokalt - feil ved sending til GitHub") {
                return "status status-error";
            }

            return "status status-local";
        }

        function oppdaterTicketListe() {
            const liste = document.getElementById("ticketListe");

            if (!innloggetBruker) {
                liste.innerHTML = "";
                return;
            }

            const mineTickets = tickets.filter(t => t.brukerEpost === innloggetBruker.epost);

            if (mineTickets.length === 0) {
                liste.innerHTML = "<h2>Dine registrerte saker</h2><p>Du har ingen registrerte saker ennå.</p>";
                return;
            }

            let html = "<h2>Dine registrerte saker</h2>";

            mineTickets.slice().reverse().forEach(function(ticket) {
                html += `
                    <div class="ticket">
                        <h3>#${ticket.id} - ${escapeHtml(ticket.tittel)}</h3>
                        <p><strong>Status:</strong> <span class="${hentStatusKlasse(ticket.status)}">${escapeHtml(ticket.status)}</span></p>
                        <p><strong>Opprettet:</strong> ${escapeHtml(ticket.dato)}</p>
                        ${ticket.beskrivelse ? `<p><strong>Beskrivelse:</strong> ${escapeHtml(ticket.beskrivelse)}</p>` : ""}
                        ${ticket.githubIssueUrl ? `<p><strong>GitHub Issue:</strong> <a href="${ticket.githubIssueUrl}" target="_blank" rel="noopener noreferrer">#${ticket.githubIssueNumber}</a></p>` : ""}
                        <div class="ticket-actions">
                            <button class="danger-btn" onclick="slettTicket(${ticket.id})">Slett sak</button>
                        </div>
                    </div>
                `;
            });

            liste.innerHTML = html;
        }

        function loggUt() {
            innloggetBruker = null;
            lagreData();
            document.getElementById("authSide").style.display = "block";
            document.getElementById("caseSide").style.display = "none";
            document.getElementById("ticketListe").innerHTML = "";
            skjulMelding("ticketMessage");
            visTab("login");
        }

        window.onload = function() {
            if (innloggetBruker) {
                visPortal();
            } else {
                visTab("login");
            }
        };
    </script>
</body>
</html>
